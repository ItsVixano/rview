name: Android Release

on:
  push:
    tags:
      - '*'

jobs:
  build_release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Configure Keystore
        env:
          KEYSTORE_KEY: ${{ secrets.KEYSTORE_KEY }}
          PASS_KEY: ${{ secrets.PASS_KEY }}
        run: |
          echo "$KEYSTORE_KEY" | base64 --decode > app/keystore.jks

          cat > release.properties << EOF
          signing.config=keystore.properties
          EOF

          cat > keystore.properties << EOF
          keystore=keystore.jks
          alias=rview
          storePass=$PASS_KEY
          pass=$PASS_KEY
          storeType=jks
          EOF

      - name: Assemble Floss Release
        run: ./gradlew assembleFlossRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-floss-release.apk
          path: app/build/outputs/apk/floss/release/app-floss-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: app/build/outputs/apk/floss/release/app-floss-release.apk
