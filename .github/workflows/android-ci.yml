name: Android CI Workflow

on:
  push:
    branches:
      - '*'

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run Lint checks and tests
        run: ./gradlew --no-daemon --parallel clean lintFlossDebug testFlossDebug

      - name: Assemble Floss Debug
        run: ./gradlew assembleFlossDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-floss-debug.apk
          path: app/build/outputs/apk/floss/debug/app-floss-debug.apk
